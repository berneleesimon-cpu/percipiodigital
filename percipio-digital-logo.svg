<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&amp;family=Oswald:wght@300;400&amp;display=swap');
    </style>

    <!-- Iris gradient -->
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C8D8E4" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#7A9BAD" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3A5A6A" stop-opacity="1"/>
    </radialGradient>

    <!-- Pupil gradient -->
    <radialGradient id="pupilGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>

    <!-- Highlight gradient -->
    <radialGradient id="highlightGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip for eye shape -->
    <clipPath id="eyeClip">
      <ellipse cx="72" cy="80" rx="52" ry="30"/>
    </clipPath>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow -->
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.78 0.85 0.89 0 0
                0.78 0.85 0.89 0 0
                0.78 0.85 0.89 0 0
                0    0    0    0.4 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: transparent (works on dark and light) -->

  <!-- ── EYE MARK ── -->
  <g filter="url(#outerGlow)">

    <!-- Eye outline / white of eye -->
    <ellipse cx="72" cy="80" rx="54" ry="31"
      fill="#F0EEF0" stroke="#9BA8B0" stroke-width="0.5"/>

    <!-- Iris -->
    <circle cx="72" cy="80" r="22" fill="url(#irisGrad)" clip-path="url(#eyeClip)"/>

    <!-- Iris ring detail -->
    <circle cx="72" cy="80" r="22"
      fill="none" stroke="#5A8090" stroke-width="0.8" opacity="0.5"
      clip-path="url(#eyeClip)"/>
    <circle cx="72" cy="80" r="16"
      fill="none" stroke="#7AA0B0" stroke-width="0.5" opacity="0.4"
      clip-path="url(#eyeClip)"/>

    <!-- Pupil -->
    <circle cx="72" cy="80" r="11" fill="url(#pupilGrad)" clip-path="url(#eyeClip)"/>

    <!-- Catchlight / highlight -->
    <ellipse cx="66" cy="74" rx="4" ry="3"
      fill="url(#highlightGrad)" clip-path="url(#eyeClip)" opacity="0.85"/>

    <!-- Eye outline stroke (lids) -->
    <ellipse cx="72" cy="80" rx="54" ry="31"
      fill="none" stroke="#C8D8E4" stroke-width="1.2" opacity="0.6"/>

    <!-- Upper lash line -->
    <path d="M 18 80 Q 72 44 126 80"
      fill="none" stroke="#F0EEF0" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>

    <!-- Lower lash line -->
    <path d="M 22 80 Q 72 108 122 80"
      fill="none" stroke="#9BA8B0" stroke-width="0.9" stroke-linecap="round" opacity="0.6"/>

    <!-- Corner detail left -->
    <path d="M 18 80 Q 14 76 12 72" fill="none" stroke="#C8D8E4" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <!-- Corner detail right -->
    <path d="M 126 80 Q 130 76 132 72" fill="none" stroke="#C8D8E4" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  </g>

  <!-- ── WORDMARK ── -->

  <!-- PERCIPIO -->
  <text
    x="148" y="74"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="900"
    font-size="38"
    letter-spacing="1"
    fill="#F0EEF0">PERCIPIO</text>

  <!-- Thin rule between words -->
  <line x1="148" y1="84" x2="448" y2="84" stroke="#9BA8B0" stroke-width="0.5" opacity="0.35"/>

  <!-- DIGITAL -->
  <text
    x="150" y="106"
    font-family="'Oswald', sans-serif"
    font-weight="300"
    font-size="17"
    letter-spacing="9"
    fill="#9BA8B0">DIGITAL</text>

  <!-- Dot accent after DIGITAL -->
  <circle cx="312" cy="101" r="2" fill="#C8D8E4" opacity="0.7"/>

</svg>
